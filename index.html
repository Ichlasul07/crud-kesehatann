<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CRUD Data Pasien</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Data Pasien</h2>
<h3>Test CI/CD Auto Deploy 🚀</h3>

<form id="formPasien">
    <input type="text" id="nama" placeholder="Nama" required>
    <input type="number" id="umur" placeholder="Umur" required>
    <input type="text" id="diagnosa" placeholder="Diagnosa" required>
    <button type="submit">Simpan</button>
</form>

<table border="1">
    <thead>
        <tr>
            <th>Nama</th>
            <th>Umur</th>
            <th>Diagnosa</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="tabelPasien"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
